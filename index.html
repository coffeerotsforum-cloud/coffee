<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JDM KIT GENERATOR</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0c1a 0%, #10141f 100%);
            font-family: 'Segoe UI', 'Courier New', monospace;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #ff5e3a, #ffb84d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        .sub {
            color: #9aacd6;
            margin-top: 8px;
        }

        .upload-area {
            background: #11161f;
            border: 2px dashed #ff6a4a;
            border-radius: 32px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 30px;
        }

        .upload-area:hover {
            border-color: #ff8a6a;
            background: #1a1f2c;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .preview {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 30px;
        }

        .preview-box {
            flex: 1;
            min-width: 250px;
            background: #0f1222;
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            border: 1px solid #2a2f42;
        }

        .preview-box h3 {
            color: #ffaa7a;
            margin-bottom: 15px;
        }

        canvas {
            width: 100%;
            max-width: 400px;
            border-radius: 16px;
            background: #1a1f2a;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .kit-info {
            background: #0f1222;
            border-radius: 24px;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid #ff6a4a40;
        }

        .kit-specs {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin: 15px 0;
        }

        .kit-badge {
            background: #1e2438;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            color: #ffbc8c;
        }

        button {
            background: #ff5e3a;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin: 8px;
            transition: 0.2s;
        }

        button:hover {
            background: #ff7a5a;
            transform: scale(1.02);
        }

        .btn-group {
            text-align: center;
            margin-top: 20px;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            font-size: 0.7rem;
            color: #4a5a7c;
        }

        input[type="file"] {
            display: none;
        }

        @media (max-width: 700px) {
            .preview {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🔰 JDM KIT GENERATOR</h1>
        <div class="sub">загрузи фото — получи уникальный обвес</div>
    </div>

    <div class="upload-area" id="uploadArea">
        <div class="upload-icon">📸</div>
        <div>нажми или перетащи фото</div>
        <input type="file" id="fileInput" accept="image/*">
    </div>

    <div class="preview" id="previewSection" style="display: none;">
        <div class="preview-box">
            <h3>📷 ОРИГИНАЛ</h3>
            <canvas id="originalCanvas"></canvas>
        </div>
        <div class="preview-box">
            <h3>✨ С ОБВЕСОМ</h3>
            <canvas id="kitCanvas"></canvas>
        </div>
    </div>

    <div id="kitInfo" class="kit-info" style="display: none;">
        <div style="text-align: center; font-weight: bold; color: #ffaa7a;">🎨 КОМПЛЕКТАЦИЯ</div>
        <div id="kitSpecs" class="kit-specs"></div>
        <div style="text-align: center; font-size: 0.8rem; color: #9aacd6;" id="kitName"></div>
    </div>

    <div class="btn-group" id="actionBtns" style="display: none;">
        <button id="randomKitBtn">🎲 СЛУЧАЙНЫЙ ОБВЕС</button>
        <button id="saveBtn">💾 СОХРАНИТЬ РЕЗУЛЬТАТ</button>
    </div>

    <footer>⚡ каждый обвес генерируется случайно · Rocket Bunny, Liberty Walk, BN Sports и другие легенды</footer>
</div>

<script>
    // ========= БАЗА JDM-ОБВЕСОВ =========
    const kits = [
        { name: "ROCKET BUNNY", style: "широкие крылья, агрессивный диффузор", colorEffect: "darken" },
        { name: "LIBERTY WALK", style: "клепаные арки, низкая посадка", colorEffect: "contrast" },
        { name: "BN SPORTS", style: "гранж-стиль, массивный бампер", colorEffect: "warm" },
        { name: "VEILSIDE", style: "элегантный агрессив, плавные линии", colorEffect: "cool" },
        { name: "VARIS", style: "карбон, аэродинамика", colorEffect: "bright" },
        { name: "TOP SECRET", style: "гоночный, минимализм", colorEffect: "grayscale" },
        { name: "ABFLUG", style: "спортивный, огромное антикрыло", colorEffect: "sepia" }
    ];

    const wheels = ["WORK", "SSR", "ENKEI", "RAYS", "BBS", "VOLK RACING", "ADVAN"];
    const wings = ["GT-WING 1600mm", "DUCKTAIL", "CARBON SPOILER", "SWAN NECK"];
    const liveries = ["полоски", "камикадзе-наклейки", "градиент", "металлик", "матовый"];

    let currentImage = null;
    let originalCanvas = document.getElementById('originalCanvas');
    let kitCanvas = document.getElementById('kitCanvas');
    let ctxOriginal = originalCanvas.getContext('2d');
    let ctxKit = kitCanvas.getContext('2d');

    // загрузка фото
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const previewSection = document.getElementById('previewSection');
    const kitInfoDiv = document.getElementById('kitInfo');
    const actionBtns = document.getElementById('actionBtns');
    const kitSpecsDiv = document.getElementById('kitSpecs');
    const kitNameSpan = document.getElementById('kitName');

    uploadArea.addEventListener('click', () => fileInput.click());
    uploadArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadArea.style.borderColor = '#ffaa7a';
    });
    uploadArea.addEventListener('dragleave', () => {
        uploadArea.style.borderColor = '#ff6a4a';
    });
    uploadArea.addEventListener('drop', (e) => {
        e.preventDefault();
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('image/')) {
            loadImage(file);
        }
    });

    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length) {
            loadImage(e.target.files[0]);
        }
    });

    function loadImage(file) {
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                currentImage = img;
                // устанавливаем размеры canvas
                const maxWidth = 500;
                const scale = maxWidth / img.width;
                const width = maxWidth;
                const height = img.height * scale;
                originalCanvas.width = width;
                originalCanvas.height = height;
                kitCanvas.width = width;
                kitCanvas.height = height;
                ctxOriginal.drawImage(img, 0, 0, width, height);
                // копируем на второй канвас
                ctxKit.drawImage(img, 0, 0, width, height);
                previewSection.style.display = 'flex';
                generateRandomKit(); // сразу первый обвес
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    }

    function generateRandomKit() {
        if (!currentImage) return;

        // выбираем случайные компоненты
        const kit = kits[Math.floor(Math.random() * kits.length)];
        const wheel = wheels[Math.floor(Math.random() * wheels.length)];
        const wing = wings[Math.floor(Math.random() * wings.length)];
        const livery = liveries[Math.floor(Math.random() * liveries.length)];
        
        // отображаем информацию
        kitSpecsDiv.innerHTML = `
            <span class="kit-badge">${kit.name}</span>
            <span class="kit-badge">${wheel}</span>
            <span class="kit-badge">${wing}</span>
            <span class="kit-badge">${livery}</span>
        `;
        kitNameSpan.innerHTML = `${kit.style} · агрессивный стайлинг`;
        kitInfoDiv.style.display = 'block';
        actionBtns.style.display = 'block';

        // рисуем "обвес" — накладываем эффект на канвас
        applyKitEffect(kit);
        
        // добавляем визуальные элементы (имитация наклеек, полосок)
        drawStickers(kit, wheel, wing);
    }

    function applyKitEffect(kit) {
        if (!currentImage) return;
        const width = kitCanvas.width;
        const height = kitCanvas.height;
        
        // перерисовываем оригинал
        ctxKit.drawImage(currentImage, 0, 0, width, height);
        
        // эффект по типу обвеса
        let imageData = ctxKit.getImageData(0, 0, width, height);
        let data = imageData.data;
        
        switch(kit.colorEffect) {
            case 'darken':
                for (let i = 0; i < data.length; i += 4) {
                    data[i] = data[i] * 0.8;
                    data[i+1] = data[i+1] * 0.8;
                    data[i+2] = data[i+2] * 0.8;
                }
                break;
            case 'contrast':
                for (let i = 0; i < data.length; i += 4) {
                    data[i] = Math.min(255, data[i] * 1.2);
                    data[i+1] = Math.min(255, data[i+1] * 1.2);
                    data[i+2] = Math.min(255, data[i+2] * 1.2);
                }
                break;
            case 'warm':
                for (let i = 0; i < data.length; i += 4) {
                    data[i] = Math.min(255, data[i] * 1.15);
                    data[i+1] = data[i+1] * 0.9;
                    data[i+2] = data[i+2] * 0.85;
                }
                break;
            case 'cool':
                for (let i = 0; i < data.length; i += 4) {
                    data[i] = data[i] * 0.85;
                    data[i+1] = data[i+1] * 0.95;
                    data[i+2] = Math.min(255, data[i+2] * 1.2);
                }
                break;
            case 'bright':
                for (let i = 0; i < data.length; i += 4) {
                    data[i] = Math.min(255, data[i] * 1.1);
                    data[i+1] = Math.min(255, data[i+1] * 1.1);
                    data[i+2] = Math.min(255, data[i+2] * 1.1);
                }
                break;
            case 'grayscale':
                for (let i = 0; i < data.length; i += 4) {
                    let avg = (data[i] + data[i+1] + data[i+2]) / 3;
                    data[i] = avg;
                    data[i+1] = avg;
                    data[i+2] = avg;
                }
                break;
            case 'sepia':
                for (let i = 0; i < data.length; i += 4) {
                    let r = data[i];
                    let g = data[i+1];
                    let b = data[i+2];
                    data[i] = Math.min(255, (r * 0.393) + (g * 0.769) + (b * 0.189));
                    data[i+1] = Math.min(255, (r * 0.349) + (g * 0.686) + (b * 0.168));
                    data[i+2] = Math.min(255, (r * 0.272) + (g * 0.534) + (b * 0.131));
                }
                break;
        }
        ctxKit.putImageData(imageData, 0, 0);
    }

    function drawStickers(kit, wheel, wing) {
        // имитация наклеек, полосок и надписей (чисто визуально)
        const width = kitCanvas.width;
        const height = kitCanvas.height;
        
        ctxKit.font = `bold ${Math.floor(width * 0.05)}px "Courier New"`;
        ctxKit.fillStyle = "#ffcc44";
        ctxKit.shadowBlur = 0;
        ctxKit.fillText(`${kit.name}`, width * 0.05, height * 0.1);
        
        ctxKit.font = `${Math.floor(width * 0.04)}px monospace`;
        ctxKit.fillStyle = "#ffaa66";
        ctxKit.fillText(`${wing}`, width * 0.05, height * 0.2);
        
        // полоска на боку
        ctxKit.beginPath();
        ctxKit.strokeStyle = "#ff8844";
        ctxKit.lineWidth = width * 0.02;
        ctxKit.moveTo(width * 0.1, height * 0.7);
        ctxKit.lineTo(width * 0.9, height * 0.7);
        ctxKit.stroke();
        
        ctxKit.fillStyle = "#ffffffcc";
        ctxKit.font = `${Math.floor(width * 0.045)}px monospace`;
        ctxKit.fillText(wheel, width * 0.6, height * 0.85);
    }

    document.getElementById('randomKitBtn').addEventListener('click', () => {
        if (currentImage) generateRandomKit();
    });

    document.getElementById('saveBtn').addEventListener('click', () => {
        const link = document.createElement('a');
        link.download = 'jdm_kit.png';
        link.href = kitCanvas.toDataURL();
        link.click();
    });

    // скрываем preview если нет фото
</script>
</body>
</html>
