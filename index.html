<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Передача файлов | GitHub Pages</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        h1 { color: #333; margin-bottom: 10px; }
        .subtitle { color: #666; margin-bottom: 30px; }
        .upload-area {
            border: 3px dashed #ccc;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        .upload-area.dragover {
            border-color: #667eea;
            background: #f0f0ff;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        #fileInfo {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            display: none;
        }
        .link {
            background: white;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            word-break: break-all;
            margin: 10px 0;
        }
        .success { color: #48bb78; }
        .error { color: #e53e3e; }
        .progress {
            width: 100%;
            height: 8px;
            background: #e2e8f0;
            border-radius: 4px;
            overflow: hidden;
            margin: 10px 0;
            display: none;
        }
        .progress-bar {
            width: 0%;
            height: 100%;
            background: #48bb78;
            transition: width 0.3s;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📤 Передача файлов</h1>
        <div class="subtitle">Загрузите файл и получите ссылку для скачивания</div>
        
        <div class="upload-area" id="dropZone">
            📂 Перетащите файл сюда или нажмите для выбора
            <input type="file" id="fileInput" style="display: none;">
        </div>
        
        <button id="uploadBtn" disabled>Выберите файл</button>
        
        <div class="progress" id="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        
        <div id="fileInfo"></div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const fileInfo = document.getElementById('fileInfo');
        const progress = document.getElementById('progress');
        const progressBar = document.getElementById('progressBar');
        
        let selectedFile = null;
        
        // Открыть выбор файла при клике на зону
        dropZone.addEventListener('click', () => fileInput.click());
        
        // Drag & drop
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });
        
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });
        
        function handleFile(file) {
            selectedFile = file;
            uploadBtn.textContent = `📤 Загрузить ${file.name} (${formatBytes(file.size)})`;
            uploadBtn.disabled = false;
            fileInfo.style.display = 'none';
        }
        
        uploadBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            
            uploadBtn.disabled = true;
            progress.style.display = 'block';
            progressBar.style.width = '0%';
            
            try {
                // Используем бесплатный сервис file.io (файлы хранятся 14 дней)
                const formData = new FormData();
                formData.append('file', selectedFile);
                
                const xhr = new XMLHttpRequest();
                xhr.open('POST', 'https://file.io/?expires=14d');
                
                xhr.upload.onprogress = (e) => {
                    if (e.lengthComputable) {
                        const percent = (e.loaded / e.total) * 100;
                        progressBar.style.width = percent + '%';
                    }
                };
                
                xhr.onload = () => {
                    if (xhr.status === 200) {
                        const response = JSON.parse(xhr.responseText);
                        if (response.success) {
                            const link = response.link;
                            fileInfo.style.display = 'block';
                            fileInfo.innerHTML = `
                                <div class="success">✅ Файл успешно загружен!</div>
                                <div class="link">
                                    <strong>🔗 Ссылка для скачивания:</strong><br>
                                    <a href="${link}" target="_blank">${link}</a>
                                </div>
                                <div style="font-size: 12px; color: #666; margin-top: 10px;">
                                    ⏰ Файл будет доступен 14 дней<br>
                                    📥 Нажмите на ссылку для скачивания
                                </div>
                                <button onclick="copyToClipboard('${link}')" style="margin-top: 10px; background: #48bb78;">
                                    📋 Скопировать ссылку
                                </button>
                            `;
                        } else {
                            throw new Error('Upload failed');
                        }
                    } else {
                        throw new Error('Server error: ' + xhr.status);
                    }
                    uploadBtn.disabled = false;
                };
                
                xhr.onerror = () => {
                    throw new Error('Network error');
                };
                
                xhr.send(formData);
                
            } catch (error) {
                fileInfo.style.display = 'block';
                fileInfo.innerHTML = `<div class="error">❌ Ошибка: ${error.message}</div>`;
                uploadBtn.disabled = false;
            }
        });
        
        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        window.copyToClipboard = (text) => {
            navigator.clipboard.writeText(text);
            alert('Ссылка скопирована в буфер обмена!');
        };
    </script>
</body>
</html>
