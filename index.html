<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JDM Garage — всё о японских тачках</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0a0f1a 0%, #0c1220 100%);
            min-height: 100vh;
            padding: 20px;
            color: #eef2ff;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* шапка */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        h1 {
            font-size: 3rem;
            background: linear-gradient(135deg, #ff4d4d, #ff9f4d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }
        .sub {
            color: #8a9bb5;
            margin-top: 8px;
        }

        /* поиск */
        .search-box {
            background: #11161f;
            border-radius: 60px;
            padding: 8px 20px;
            display: flex;
            gap: 12px;
            margin-bottom: 40px;
            border: 1px solid #2a3448;
        }
        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 16px 8px;
            font-size: 1.1rem;
            color: #ffd966;
            outline: none;
            font-weight: 500;
            text-transform: uppercase;
        }
        .search-box input::placeholder {
            color: #4a5b7c;
            text-transform: none;
        }
        .search-box button {
            background: #e63946;
            color: white;
            border: none;
            padding: 0 28px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .search-box button:hover {
            background: #ff4d5e;
            transform: scale(1.02);
        }

        /* карточка машины */
        .car-card {
            background: #0f1622;
            border-radius: 32px;
            overflow: hidden;
            border: 1px solid #2a3448;
            display: none;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px);}
            to { opacity: 1; transform: translateY(0);}
        }

        .car-image {
            width: 100%;
            height: 320px;
            object-fit: cover;
            background: #1a1f2c;
            display: block;
        }

        .car-info {
            padding: 28px;
        }

        .car-name {
            font-size: 2rem;
            font-weight: 800;
            color: #ffd966;
            margin-bottom: 8px;
        }

        .specs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin: 24px 0;
            background: #0b1018;
            padding: 20px;
            border-radius: 24px;
        }

        .spec-item {
            text-align: center;
        }
        .spec-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #8a9bb5;
            letter-spacing: 1px;
        }
        .spec-value {
            font-size: 1.2rem;
            font-weight: bold;
            color: #ffaa66;
            margin-top: 6px;
        }

        .description {
            line-height: 1.6;
            color: #bcc6dc;
            margin-top: 16px;
        }

        .not-found {
            text-align: center;
            padding: 40px;
            background: #0f1622;
            border-radius: 32px;
            display: none;
            color: #ff8a6f;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            font-size: 0.7rem;
            color: #4a5b7c;
        }

        @media (max-width: 700px) {
            h1 { font-size: 2rem; }
            .car-name { font-size: 1.5rem; }
            .specs { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🔰 JDM GARAGE</h1>
        <div class="sub">введи модель — получи данные по культовым японским машинам</div>
    </div>

    <div class="search-box">
        <input type="text" id="carInput" placeholder="Например: Supra, RX-7, Skyline, NSX, Impreza, Evo, 240SX, Silvia, Celica...">
        <button id="searchBtn">🔍 НАЙТИ</button>
    </div>

    <div id="carCard" class="car-card"></div>
    <div id="notFound" class="not-found"></div>

    <footer>
        ⚡ База JDM-моделей | обновляется вручную | GitHub Pages
    </footer>
</div>

<script>
    // ========= БАЗА JDM МАШИН =========
    const jdmCars = {
        "supra": {
            name: "Toyota Supra A80",
            image: "https://cdn.pixabay.com/photo/2022/02/18/07/47/toyota-supra-7020391_1280.jpg",
            engine: "2JZ-GTE 3.0L Twin Turbo",
            power: "320 л.с. (стек) / 1000+ л.с. (тюнинг)",
            years: "1993–2002",
            drive: "Задний",
            description: "Легендарное купе, символ японского тюнинга. Двигатель 2JZ выдерживает огромные мощности. Известна по фильму Форсаж."
        },
        "rx-7": {
            name: "Mazda RX-7 FD3S",
            image: "https://cdn.pixabay.com/photo/2017/07/04/00/07/mazda-rx-7-2467517_1280.jpg",
            engine: "13B-REW 1.3L Rotary Twin Turbo",
            power: "255–280 л.с.",
            years: "1992–2002",
            drive: "Задний",
            description: "Роторный двигатель, лёгкий кузов, идеальный баланс. Икона JDM и Initial D."
        },
        "skyline": {
            name: "Nissan Skyline GT-R R34",
            image: "https://cdn.pixabay.com/photo/2021/12/18/14/15/skyline-6878775_1280.jpg",
            engine: "RB26DETT 2.6L Twin Turbo",
            power: "280 л.с. (заявлена), реально ~330 л.с.",
            years: "1999–2002",
            drive: "Полный (ATTESA E-TS)",
            description: "Главная звезда Форсажа и Gran Turismo. Система полного привода, 2.6 twin-turbo, культовый статус."
        },
        "nsx": {
            name: "Honda NSX (NA1)",
            image: "https://cdn.pixabay.com/photo/2018/04/28/09/55/acura-3357355_1280.jpg",
            engine: "C30A 3.0L V6 VTEC",
            power: "274 л.с.",
            years: "1990–2005",
            drive: "Задний",
            description: "Суперкар от Honda, разработанный при участии Айртона Сенны. Алюминиевый кузов, надежность как у Honda Civic."
        },
        "impreza": {
            name: "Subaru Impreza WRX STI (GC8)",
            image: "https://cdn.pixabay.com/photo/2022/08/25/22/18/subaru-impreza-7410990_1280.jpg",
            engine: "EJ20 2.0L Turbo Boxer",
            power: "280 л.с.",
            years: "1994–2000",
            drive: "Полный",
            description: "Раллийная легенда. Оппозитный двигатель, полный привод, характерный вой турбины."
        },
        "evo": {
            name: "Mitsubishi Lancer Evolution VI",
            image: "https://cdn.pixabay.com/photo/2019/08/21/21/17/mitsubishi-4421953_1280.jpg",
            engine: "4G63T 2.0L Turbo",
            power: "280 л.с.",
            years: "1999–2001",
            drive: "Полный",
            description: "Главный соперник Impreza. Двигатель 4G63 — легенда тюнинга, активный дифференциал AYC."
        },
        "240sx": {
            name: "Nissan 240SX (S13)",
            image: "https://cdn.pixabay.com/photo/2017/05/28/18/22/nissan-2352157_1280.jpg",
            engine: "KA24DE 2.4L / SR20DET",
            power: "155–205 л.с.",
            years: "1989–1998",
            drive: "Задний",
            description: "Дрифт-классика. Лёгкий, задний привод, огромный выбор свопов. Популярна в Formula Drift."
        },
        "silvia": {
            name: "Nissan Silvia S15",
            image: "https://cdn.pixabay.com/photo/2021/04/19/20/51/silvia-6191879_1280.jpg",
            engine: "SR20DET 2.0L Turbo",
            power: "250 л.с.",
            years: "1999–2002",
            drive: "Задний",
            description: "Икона дрифта. Идеальный баланс, надежный SR20, стильный дизайн."
        },
        "celica": {
            name: "Toyota Celica GT-Four (ST205)",
            image: "https://cdn.pixabay.com/photo/2020/04/02/21/45/toyota-celica-4994853_1280.jpg",
            engine: "3S-GTE 2.0L Turbo",
            power: "255 л.с.",
            years: "1994–1999",
            drive: "Полный",
            description: "Раллийная версия Celica. Полный привод, мощный турбомотор. Известна по игре Gran Turismo."
        }
    };

    const searchBtn = document.getElementById('searchBtn');
    const carInput = document.getElementById('carInput');
    const carCardDiv = document.getElementById('carCard');
    const notFoundDiv = document.getElementById('notFound');

    function showCar(modelKey) {
        const car = jdmCars[modelKey];
        if (!car) {
            carCardDiv.style.display = 'none';
            notFoundDiv.style.display = 'block';
            notFoundDiv.innerHTML = `
                <div style="font-size: 1.5rem; margin-bottom: 10px;">😭 МАШИНА НЕ НАЙДЕНА</div>
                <div style="color:#b0bedb;">Попробуй: Supra, RX-7, Skyline, NSX, Impreza, Evo, 240SX, Silvia, Celica</div>
            `;
            return;
        }

        notFoundDiv.style.display = 'none';
        carCardDiv.style.display = 'block';
        carCardDiv.innerHTML = `
            <img class="car-image" src="${car.image}" alt="${car.name}" onerror="this.src='https://placehold.co/800x400/1a1f2c/ffaa66?text=JDM'">
            <div class="car-info">
                <div class="car-name">${car.name}</div>
                <div class="specs">
                    <div class="spec-item"><div class="spec-label">ДВИГАТЕЛЬ</div><div class="spec-value">${car.engine}</div></div>
                    <div class="spec-item"><div class="spec-label">МОЩНОСТЬ</div><div class="spec-value">${car.power}</div></div>
                    <div class="spec-item"><div class="spec-label">ГОДЫ</div><div class="spec-value">${car.years}</div></div>
                    <div class="spec-item"><div class="spec-label">ПРИВОД</div><div class="spec-value">${car.drive}</div></div>
                </div>
                <div class="description">${car.description}</div>
            </div>
        `;
    }

    function searchCar() {
        let query = carInput.value.trim().toLowerCase();
        if (!query) return;
        // нормализация: убираем пробелы, дефисы, приводим к ключу
        const normalized = query.replace(/[-\s]/g, '');
        // ищем точное совпадение
        if (jdmCars[normalized]) {
            showCar(normalized);
        } else if (jdmCars[query]) {
            showCar(query);
        } else {
            // пробуем частичное совпадение
            const keys = Object.keys(jdmCars);
            const match = keys.find(key => key.includes(normalized) || normalized.includes(key));
            if (match) {
                showCar(match);
            } else {
                showCar(null);
            }
        }
    }

    searchBtn.addEventListener('click', searchCar);
    carInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') searchCar();
    });

    // демо при загрузке
    setTimeout(() => {
        carInput.value = "Supra";
        searchCar();
    }, 100);
</script>
</body>
</html>
