<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FileShare - Google Диск</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .upload-area {
            border: 3px dashed #ccc;
            border-radius: 12px;
            padding: 50px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
            background: #fafafa;
        }
        
        .upload-area:hover {
            border-color: #667eea;
            background: #f5f5ff;
        }
        
        .upload-area.dragover {
            border-color: #667eea;
            background: #e8eaff;
            transform: scale(1.02);
        }
        
        .upload-icon {
            font-size: 64px;
            margin-bottom: 10px;
        }
        
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            font-weight: 600;
        }
        
        button:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .file-card {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            display: none;
            animation: slideIn 0.3s ease;
        }
        
        .progress-container {
            width: 100%;
            height: 10px;
            background: #e2e8f0;
            border-radius: 5px;
            overflow: hidden;
            margin: 15px 0;
        }
        
        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #48bb78, #38a169);
            transition: width 0.3s;
        }
        
        .link-box {
            background: white;
            padding: 15px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            margin: 15px 0;
            word-break: break-all;
        }
        
        .success {
            color: #48bb78;
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 15px;
        }
        
        .error {
            color: #e53e3e;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .copy-btn {
            background: #48bb78;
            margin-top: 10px;
        }
        
        .copy-btn:hover {
            background: #38a169;
        }
        
        .info-box {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 12px;
            margin-top: 20px;
            border-radius: 8px;
            font-size: 13px;
            color: #1976d2;
        }
        
        @keyframes slideIn {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .file-info {
            margin: 10px 0;
            color: #666;
            font-size: 14px;
        }
        
        .badge {
            display: inline-block;
            background: #e2e8f0;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            margin-right: 8px;
        }
        
        .auth-btn {
            background: #4285f4;
            margin-bottom: 15px;
        }
        
        .auth-btn:hover {
            background: #3367d6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📤 FileShare</h1>
        <div class="subtitle">Загрузите файл на Google Диск и получите ссылку</div>
        
        <button id="authBtn" class="auth-btn">🔐 Войти через Google</button>
        
        <div id="uploadSection" style="display: none;">
            <div class="upload-area" id="dropZone">
                <div class="upload-icon">📂</div>
                <div>Перетащите файл сюда или нажмите для выбора</div>
                <input type="file" id="fileInput" style="display: none;">
            </div>
            
            <div class="file-info" id="fileInfo" style="display: none;"></div>
            <div class="progress-container" id="progressContainer" style="display: none;">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            
            <button id="uploadBtn" disabled>Выберите файл</button>
            
            <div id="resultCard" class="file-card"></div>
        </div>
        
        <div class="info-box">
            💡 <strong>Как это работает:</strong><br>
            • Войдите в свой Google аккаунт<br>
            • Файл загрузится на ваш Google Диск<br>
            • Вы получите ссылку для отправки кому угодно<br>
            • Файл хранится навсегда (пока вы не удалите)
        </div>
    </div>

    <script src="https://apis.google.com/js/api.js"></script>
    <script>
        // Google Drive API настройки
        const CLIENT_ID = 'YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com'; // Нужно создать в Google Cloud Console
        const API_KEY = 'YOUR_API_KEY'; // Нужно создать в Google Cloud Console
        const SCOPES = 'https://www.googleapis.com/auth/drive.file';
        
        let authToken = null;
        let selectedFile = null;
        
        const authBtn = document.getElementById('authBtn');
        const uploadSection = document.getElementById('uploadSection');
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const fileInfo = document.getElementById('fileInfo');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const resultCard = document.getElementById('resultCard');
        
        // Проверка авторизации
        function checkAuth() {
            gapi.load('client:auth2', () => {
                gapi.client.init({
                    apiKey: API_KEY,
                    clientId: CLIENT_ID,
                    scope: SCOPES
                }).then(() => {
                    const auth = gapi.auth2.getAuthInstance();
                    if (auth.isSignedIn.get()) {
                        authToken = auth.currentUser.get().getAuthResponse().access_token;
                        showUploadSection();
                    } else {
                        authBtn.style.display = 'block';
                    }
                });
            });
        }
        
        // Вход
        authBtn.addEventListener('click', () => {
            gapi.load('client:auth2', () => {
                gapi.client.init({
                    apiKey: API_KEY,
                    clientId: CLIENT_ID,
                    scope: SCOPES
                }).then(() => {
                    const auth = gapi.auth2.getAuthInstance();
                    auth.signIn().then(() => {
                        authToken = auth.currentUser.get().getAuthResponse().access_token;
                        showUploadSection();
                    });
                });
            });
        });
        
        function showUploadSection() {
            authBtn.style.display = 'none';
            uploadSection.style.display = 'block';
        }
        
        // Drag & drop
        dropZone.addEventListener('click', () => fileInput.click());
        
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });
        
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                selectFile(files[0]);
            }
        });
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                selectFile(e.target.files[0]);
            }
        });
        
        function selectFile(file) {
            selectedFile = file;
            uploadBtn.disabled = false;
            uploadBtn.textContent = `📤 Загрузить ${file.name} (${formatBytes(file.size)})`;
            
            fileInfo.style.display = 'block';
            fileInfo.innerHTML = `
                <span class="badge">📄 ${file.name}</span>
                <span class="badge">💾 ${formatBytes(file.size)}</span>
            `;
            
            resultCard.style.display = 'none';
        }
        
        uploadBtn.addEventListener('click', async () => {
            if (!selectedFile || !authToken) return;
            
            uploadBtn.disabled = true;
            uploadBtn.innerHTML = '<span class="spinner"></span> Загрузка на Google Диск...';
            progressContainer.style.display = 'block';
            progressBar.style.width = '0%';
            resultCard.style.display = 'none';
            
            // Создаем метаданные файла
            const metadata = {
                name: selectedFile.name,
                parents: ['root']
            };
            
            const form = new FormData();
            form.append('metadata', new Blob([JSON.stringify(metadata)], {type: 'application/json'}));
            form.append('file', selectedFile);
            
            const xhr = new XMLHttpRequest();
            
            xhr.upload.addEventListener('progress', (e) => {
                if (e.lengthComputable) {
                    const percent = (e.loaded / e.total) * 100;
                    progressBar.style.width = percent + '%';
                }
            });
            
            xhr.addEventListener('load', () => {
                if (xhr.status === 200) {
                    const response = JSON.parse(xhr.responseText);
                    const fileId = response.id;
                    const shareLink = `https://drive.google.com/file/d/${fileId}/view`;
                    
                    // Делаем файл публичным
                    makeFilePublic(fileId, shareLink);
                } else {
                    showError('Ошибка загрузки: ' + xhr.status);
                }
            });
            
            xhr.addEventListener('error', () => {
                showError('Ошибка сети. Проверьте интернет.');
            });
            
            xhr.open('POST', 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart');
            xhr.setRequestHeader('Authorization', `Bearer ${authToken}`);
            xhr.send(form);
        });
        
        function makeFilePublic(fileId, shareLink) {
            const xhr = new XMLHttpRequest();
            xhr.open('POST', `https://www.googleapis.com/drive/v3/files/${fileId}/permissions`);
            xhr.setRequestHeader('Authorization', `Bearer ${authToken}`);
            xhr.setRequestHeader('Content-Type', 'application/json');
            
            const body = JSON.stringify({
                role: 'reader',
                type: 'anyone'
            });
            
            xhr.onload = () => {
                if (xhr.status === 200) {
                    showSuccess(shareLink, selectedFile.name);
                } else {
                    showSuccess(shareLink, selectedFile.name); // Все равно показываем ссылку
                }
            };
            
            xhr.onerror = () => {
                showSuccess(shareLink, selectedFile.name);
            };
            
            xhr.send(body);
        }
        
        function showSuccess(link, fileName) {
            progressContainer.style.display = 'none';
            resultCard.style.display = 'block';
            resultCard.innerHTML = `
                <div class="success">✅ Файл на Google Диске!</div>
                <div class="link-box">
                    <strong>🔗 Ссылка для других:</strong><br>
                    <input type="text" id="shareLink" value="${link}" readonly 
                           style="width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; font-size: 12px;">
                    <button class="copy-btn" onclick="copyShareLink()">📋 Скопировать ссылку</button>
                </div>
                <div style="margin-top: 15px; padding: 12px; background: #fff3cd; border-radius: 8px;">
                    <strong>📱 Как поделиться:</strong><br>
                    1. Скопируйте ссылку выше<br>
                    2. Отправьте её кому угодно (Telegram, WhatsApp, email)<br>
                    3. Получатель откроет ссылку и скачает файл<br>
                    <br>
                    📂 Файл на вашем Google Диске<br>
                    🔒 Можете удалить в любой момент
                </div>
                <button onclick="resetUpload()" style="background: #6c757d; margin-top: 15px;">
                    📤 Загрузить другой файл
                </button>
            `;
            uploadBtn.style.display = 'none';
        }
        
        function showError(message) {
            progressContainer.style.display = 'none';
            resultCard.style.display = 'block';
            resultCard.innerHTML = `
                <div class="error">❌ ${message}</div>
                <div style="margin-top: 15px;">
                    <button onclick="location.reload()">🔄 Попробовать снова</button>
                </div>
            `;
            uploadBtn.disabled = false;
            uploadBtn.innerHTML = '📤 Попробовать снова';
        }
        
        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        window.copyShareLink = () => {
            const linkInput = document.getElementById('shareLink');
            if (linkInput) {
                linkInput.select();
                document.execCommand('copy');
                alert('✅ Ссылка скопирована! Отправьте её кому угодно.');
            }
        };
        
        function resetUpload() {
            location.reload();
        }
        
        // Загружаем Google API
        const script = document.createElement('script');
        script.src = 'https://apis.google.com/js/api.js';
        script.onload = () => {
            setTimeout(checkAuth, 100);
        };
        document.head.appendChild(script);
    </script>
</body>
</html>
