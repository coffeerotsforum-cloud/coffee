<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FileShare - Облачная передача файлов</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .upload-area {
            border: 3px dashed #ccc;
            border-radius: 12px;
            padding: 50px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
            background: #fafafa;
        }
        
        .upload-area:hover {
            border-color: #667eea;
            background: #f5f5ff;
        }
        
        .upload-area.dragover {
            border-color: #667eea;
            background: #e8eaff;
            transform: scale(1.02);
        }
        
        .upload-icon {
            font-size: 64px;
            margin-bottom: 10px;
        }
        
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            font-weight: 600;
        }
        
        button:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .file-card {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            display: none;
            animation: slideIn 0.3s ease;
        }
        
        .progress-container {
            width: 100%;
            height: 10px;
            background: #e2e8f0;
            border-radius: 5px;
            overflow: hidden;
            margin: 15px 0;
        }
        
        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #48bb78, #38a169);
            transition: width 0.3s;
        }
        
        .link-box {
            background: white;
            padding: 15px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            margin: 15px 0;
            word-break: break-all;
        }
        
        .success {
            color: #48bb78;
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 15px;
        }
        
        .error {
            color: #e53e3e;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .copy-btn {
            background: #48bb78;
            margin-top: 10px;
        }
        
        .copy-btn:hover {
            background: #38a169;
        }
        
        .info-box {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 12px;
            margin-top: 20px;
            border-radius: 8px;
            font-size: 13px;
            color: #1976d2;
        }
        
        @keyframes slideIn {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .file-info {
            margin: 10px 0;
            color: #666;
            font-size: 14px;
        }
        
        .badge {
            display: inline-block;
            background: #e2e8f0;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📤 FileShare</h1>
        <div class="subtitle">Загрузите файл и получите ссылку для других</div>
        
        <div class="upload-area" id="dropZone">
            <div class="upload-icon">📂</div>
            <div>Перетащите файл сюда или нажмите для выбора</div>
            <input type="file" id="fileInput" style="display: none;">
        </div>
        
        <div class="file-info" id="fileInfo" style="display: none;"></div>
        <div class="progress-container" id="progressContainer" style="display: none;">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        
        <button id="uploadBtn" disabled>Выберите файл</button>
        
        <div id="resultCard" class="file-card"></div>
        
        <div class="info-box">
            💡 <strong>Как это работает:</strong><br>
            • Файл загружается на бесплатный облачный сервер<br>
            • Вы получаете ссылку, которой можно поделиться<br>
            • Файл хранится 14 дней<br>
            • Максимальный размер: 100 МБ (бесплатно)
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const fileInfo = document.getElementById('fileInfo');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const resultCard = document.getElementById('resultCard');
        
        let selectedFile = null;
        
        // Drag & drop
        dropZone.addEventListener('click', () => fileInput.click());
        
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });
        
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                selectFile(files[0]);
            }
        });
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                selectFile(e.target.files[0]);
            }
        });
        
        function selectFile(file) {
            if (file.size > 100 * 1024 * 1024) {
                alert('Файл слишком большой! Максимум 100 МБ');
                return;
            }
            
            selectedFile = file;
            uploadBtn.disabled = false;
            uploadBtn.textContent = `📤 Загрузить ${file.name} (${formatBytes(file.size)})`;
            
            fileInfo.style.display = 'block';
            fileInfo.innerHTML = `
                <span class="badge">📄 ${file.name}</span>
                <span class="badge">💾 ${formatBytes(file.size)}</span>
                <span class="badge">⏰ До 14 дней</span>
            `;
            
            resultCard.style.display = 'none';
        }
        
        uploadBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            
            uploadBtn.disabled = true;
            uploadBtn.innerHTML = '<span class="spinner"></span> Загрузка...';
            progressContainer.style.display = 'block';
            progressBar.style.width = '0%';
            resultCard.style.display = 'none';
            
            const formData = new FormData();
            formData.append('file', selectedFile);
            
            const xhr = new XMLHttpRequest();
            
            xhr.upload.addEventListener('progress', (e) => {
                if (e.lengthComputable) {
                    const percent = (e.loaded / e.total) * 100;
                    progressBar.style.width = percent + '%';
                }
            });
            
            xhr.addEventListener('load', () => {
                if (xhr.status === 200) {
                    try {
                        const response = JSON.parse(xhr.responseText);
                        if (response.success) {
                            showSuccess(response.link, selectedFile.name);
                        } else {
                            showError('Ошибка загрузки. Попробуйте другой сервис.');
                        }
                    } catch (e) {
                        // Если file.io не работает, пробуем другой сервис
                        uploadToAlternative(selectedFile);
                    }
                } else {
                    // Если file.io не работает, пробуем другой сервис
                    uploadToAlternative(selectedFile);
                }
            });
            
            xhr.addEventListener('error', () => {
                uploadToAlternative(selectedFile);
            });
            
            xhr.open('POST', 'https://file.io/?expires=14d');
            xhr.send(formData);
        });
        
        function uploadToAlternative(file) {
            // Альтернативный сервис (GoFile.io)
            const formData = new FormData();
            formData.append('file', file);
            
            const xhr = new XMLHttpRequest();
            
            xhr.upload.addEventListener('progress', (e) => {
                if (e.lengthComputable) {
                    const percent = (e.loaded / e.total) * 100;
                    progressBar.style.width = percent + '%';
                }
            });
            
            xhr.addEventListener('load', () => {
                if (xhr.status === 200) {
                    try {
                        const response = JSON.parse(xhr.responseText);
                        if (response.data && response.data.downloadPage) {
                            showSuccess(response.data.downloadPage, file.name);
                        } else {
                            showError('Сервисы временно недоступны. Попробуйте позже.');
                        }
                    } catch (e) {
                        showError('Ошибка загрузки. Попробуйте позже.');
                    }
                } else {
                    showError('Не удалось загрузить файл. Попробуйте позже.');
                }
                uploadBtn.disabled = false;
                uploadBtn.innerHTML = '📤 Загрузить другой файл';
            });
            
            xhr.addEventListener('error', () => {
                showError('Ошибка сети. Проверьте интернет-соединение.');
                uploadBtn.disabled = false;
                uploadBtn.innerHTML = '📤 Попробовать снова';
            });
            
            xhr.open('POST', 'https://api.gofile.io/uploadFile');
            xhr.send(formData);
        }
        
        function showSuccess(link, fileName) {
            progressContainer.style.display = 'none';
            resultCard.style.display = 'block';
            resultCard.innerHTML = `
                <div class="success">✅ Файл успешно загружен!</div>
                <div class="link-box">
                    <strong>🔗 Ссылка для других:</strong><br>
                    <input type="text" id="shareLink" value="${link}" readonly 
                           style="width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; font-size: 12px;">
                    <button class="copy-btn" onclick="copyShareLink()">📋 Скопировать ссылку</button>
                </div>
                <div style="margin-top: 15px; padding: 12px; background: #fff3cd; border-radius: 8px;">
                    <strong>📱 Как поделиться:</strong><br>
                    1. Скопируйте ссылку выше<br>
                    2. Отправьте её кому угодно (Telegram, WhatsApp, email)<br>
                    3. Получатель откроет ссылку и скачает файл<br>
                    <br>
                    ⏰ Файл будет доступен 14 дней<br>
                    📥 Максимальное количество скачиваний: неограниченно
                </div>
                <button onclick="resetUpload()" style="background: #6c757d; margin-top: 15px;">
                    📤 Загрузить другой файл
                </button>
            `;
            uploadBtn.style.display = 'none';
        }
        
        function showError(message) {
            progressContainer.style.display = 'none';
            resultCard.style.display = 'block';
            resultCard.innerHTML = `
                <div class="error">❌ ${message}</div>
                <div style="margin-top: 15px;">
                    <button onclick="location.reload()">🔄 Попробовать снова</button>
                </div>
                <div style="margin-top: 15px; padding: 12px; background: #e3f2fd; border-radius: 8px;">
                    <strong>💡 Альтернативные способы:</strong><br>
                    • <a href="https://wetransfer.com" target="_blank">WeTransfer</a> - до 2 ГБ<br>
                    • <a href="https://fromsmash.com" target="_blank">FromSmash</a> - до 2 ГБ<br>
                    • <a href="https://gofile.io" target="_blank">GoFile</a> - без ограничений
                </div>
            `;
            uploadBtn.disabled = false;
            uploadBtn.innerHTML = '📤 Попробовать снова';
        }
        
        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        window.copyShareLink = () => {
            const linkInput = document.getElementById('shareLink');
            if (linkInput) {
                linkInput.select();
                document.execCommand('copy');
                alert('✅ Ссылка скопирована! Теперь отправьте её кому угодно.');
            }
        };
        
        function resetUpload() {
            location.reload();
        }
    </script>
</body>
</html>
