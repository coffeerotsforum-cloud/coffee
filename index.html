<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FileDrop - Передача файлов</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 550px;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 32px;
            color: #333;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 25px;
        }
        .dropzone {
            border: 2px dashed #cbd5e0;
            border-radius: 20px;
            padding: 40px 20px;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8fafc;
            margin-bottom: 20px;
        }
        .dropzone:hover {
            border-color: #667eea;
            background: #f1f5f9;
        }
        .dropzone.drag {
            border-color: #667eea;
            background: #eef2ff;
        }
        .icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        button:disabled {
            background: #cbd5e0;
            cursor: not-allowed;
        }
        .progress {
            margin: 20px 0;
            display: none;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: #48bb78;
            transition: width 0.3s;
        }
        .result {
            margin-top: 25px;
            padding: 20px;
            background: #f8fafc;
            border-radius: 20px;
            display: none;
        }
        .link-box {
            background: white;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            margin: 12px 0;
            word-break: break-all;
        }
        .link-box input {
            width: 100%;
            border: none;
            outline: none;
            font-size: 12px;
        }
        .copy-btn {
            background: #48bb78;
            margin-top: 8px;
        }
        .info {
            margin-top: 20px;
            font-size: 12px;
            color: #94a3b8;
        }
        .file-name {
            margin: 10px 0;
            font-size: 14px;
            color: #475569;
        }
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid white;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📤 FileDrop</h1>
        <div class="subtitle">Кидай файл → получай ссылку</div>
        
        <div class="dropzone" id="dropzone">
            <div class="icon">📂</div>
            <div>Нажми или перетащи файл</div>
            <input type="file" id="fileInput" style="display: none;">
        </div>
        
        <div id="fileName" class="file-name"></div>
        
        <div class="progress" id="progress">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>
        
        <button id="uploadBtn" disabled>Выберите файл</button>
        
        <div class="result" id="result">
            <strong style="color: #48bb78;">✅ Файл загружен!</strong>
            <div class="link-box">
                <input type="text" id="linkInput" readonly>
            </div>
            <button class="copy-btn" id="copyBtn">📋 Скопировать ссылку</button>
        </div>
        
        <div class="info">
            🔒 Файлы до 5 ГБ • Хранятся 30 дней • Без регистрации
        </div>
    </div>

    <script>
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const fileNameDiv = document.getElementById('fileName');
        const progressDiv = document.getElementById('progress');
        const progressFill = document.getElementById('progressFill');
        const resultDiv = document.getElementById('result');
        const linkInput = document.getElementById('linkInput');
        const copyBtn = document.getElementById('copyBtn');
        
        let selectedFile = null;
        
        dropzone.onclick = () => fileInput.click();
        
        dropzone.ondragover = (e) => {
            e.preventDefault();
            dropzone.classList.add('drag');
        };
        
        dropzone.ondragleave = () => {
            dropzone.classList.remove('drag');
        };
        
        dropzone.ondrop = (e) => {
            e.preventDefault();
            dropzone.classList.remove('drag');
            if (e.dataTransfer.files.length) {
                selectFile(e.dataTransfer.files[0]);
            }
        };
        
        fileInput.onchange = (e) => {
            if (e.target.files.length) {
                selectFile(e.target.files[0]);
            }
        };
        
        function selectFile(file) {
            selectedFile = file;
            fileNameDiv.textContent = `📄 ${file.name} (${formatBytes(file.size)})`;
            uploadBtn.disabled = false;
            uploadBtn.textContent = `🚀 Загрузить ${file.name}`;
            resultDiv.style.display = 'none';
            progressDiv.style.display = 'none';
        }
        
        uploadBtn.onclick = () => {
            if (!selectedFile) return;
            
            uploadBtn.disabled = true;
            uploadBtn.innerHTML = '<span class="spinner"></span> Загрузка...';
            progressDiv.style.display = 'block';
            progressFill.style.width = '0%';
            resultDiv.style.display = 'none';
            
            const formData = new FormData();
            formData.append('file', selectedFile);
            
            const xhr = new XMLHttpRequest();
            
            xhr.upload.onprogress = (e) => {
                if (e.lengthComputable) {
                    const percent = (e.loaded / e.total) * 100;
                    progressFill.style.width = percent + '%';
                }
            };
            
            xhr.onload = () => {
                if (xhr.status === 200) {
                    try {
                        const data = JSON.parse(xhr.responseText);
                        const fileUrl = `https://pixeldrain.com/u/${data.id}`;
                        resultDiv.style.display = 'block';
                        linkInput.value = fileUrl;
                        uploadBtn.disabled = false;
                        uploadBtn.innerHTML = '📤 Загрузить другой файл';
                    } catch(e) {
                        showError('Ошибка: не удалось обработать ответ');
                    }
                } else {
                    showError('Ошибка загрузки. Код: ' + xhr.status);
                }
            };
            
            xhr.onerror = () => {
                showError('Ошибка сети. Проверьте интернет.');
            };
            
            xhr.open('POST', 'https://pixeldrain.com/api/file');
            xhr.send(formData);
        };
        
        function showError(msg) {
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = `
                <div style="color: #e53e3e; font-weight: 600;">❌ ${msg}</div>
                <button onclick="location.reload()" style="margin-top: 12px; background: #6c757d;">🔄 Попробовать снова</button>
            `;
            uploadBtn.disabled = false;
        }
        
        copyBtn.onclick = () => {
            linkInput.select();
            document.execCommand('copy');
            alert('✅ Ссылка скопирована!');
        };
        
        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }
    </script>
</body>
</html>
