<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Уфа LIVE — городские камеры</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, -apple-system, sans-serif;
            background: radial-gradient(circle at 10% 20%, #0b1120, #030617);
            color: #eef2ff;
            padding: 24px 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .hero {
            text-align: center;
            margin-bottom: 40px;
        }
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #f0b86e, #c084fc, #60a5fa);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .sub {
            color: #9ca3af;
            font-size: 0.95rem;
        }
        .city-badge {
            background: rgba(96, 165, 250, 0.15);
            backdrop-filter: blur(4px);
            padding: 6px 14px;
            border-radius: 60px;
            font-size: 0.75rem;
            width: fit-content;
            margin: 16px auto 0;
            border: 1px solid #3b4a6b;
        }

        .cam-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 28px;
            margin: 32px 0;
        }

        .cam-card {
            background: rgba(17, 24, 39, 0.85);
            backdrop-filter: blur(2px);
            border-radius: 32px;
            overflow: hidden;
            border: 1px solid #2d3a5e;
            transition: all 0.25s ease;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }
        .cam-card:hover {
            transform: translateY(-5px);
            border-color: #60a5fa;
        }

        .cam-view {
            background: #010101;
            aspect-ratio: 16 / 9;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cam-view iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #0a0c15;
        }
        .cam-label {
            padding: 16px 18px 18px 18px;
        }
        .cam-name {
            font-weight: 700;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }
        .cam-address {
            font-size: 0.75rem;
            color: #9bb5e0;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .live-tag {
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 6px #ff4d4d;
            animation: pulse 1.2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.4; transform: scale(0.8);}
            100% { opacity: 1; transform: scale(1.2);}
        }

        .info-panel {
            background: #0f1422cc;
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 20px 24px;
            margin-top: 20px;
            border: 1px solid #2a3655;
            text-align: center;
            font-size: 0.85rem;
        }
        .footer-note {
            text-align: center;
            font-size: 0.7rem;
            color: #5b6e8c;
            margin-top: 40px;
        }
        button {
            background: #2d3a5e;
            border: none;
            color: white;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.75rem;
            cursor: pointer;
            margin-top: 8px;
            transition: 0.2s;
        }
        button:hover {
            background: #3b4a70;
        }
        @media (max-width: 720px) {
            .cam-grid {
                grid-template-columns: 1fr;
            }
            h1 {
                font-size: 1.9rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <h1>📡 УФА · ПРЯМОЙ ЭФИР</h1>
        <div class="sub">городские камеры — всё внутри, без переходов</div>
        <div class="city-badge">📍 8 камер · реальное время</div>
    </div>

    <div class="cam-grid" id="camGrid"></div>

    <div class="info-panel">
        🎥 <strong>Твой личный обзор Уфы</strong><br>
        Картинка идёт напрямую с городских камер. Никаких кликов по ссылкам — смотри и всё.
        <br><br>
        <button id="refreshBtn">⟳ Обновить все камеры</button>
    </div>
    <div class="footer-note">
        ⚡ Свой стиль · GitHub Pages · только картинка, без переходов
    </div>
</div>

<script>
    // ===== КАМЕРЫ УФЫ — ТОЛЬКО EMBED, НИ ОДНОЙ ССЫЛКИ =====
    const cameras = [
        {
            name: "🌉 Перекрёсток Гоголя — Цюрупы",
            address: "центр, светофорный узел",
            embed: "https://maps.ufanet.ru/cam/1101?embed=1"
        },
        {
            name: "🏛️ Проспект Октября — Гостиница Россия",
            address: "вид на памятник Салавату Юлаеву",
            embed: "https://maps.ufanet.ru/cam/1088?embed=1"
        },
        {
            name: "🚦 Улица 50 лет Октября — ТРЦ Планета",
            address: "оживлённая магистраль",
            embed: "https://maps.ufanet.ru/cam/1156?embed=1"
        },
        {
            name: "🌳 Парк Победы (вид на фонтан)",
            address: "проспект Октября, зона отдыха",
            embed: "https://maps.ufanet.ru/cam/1203?embed=1"
        },
        {
            name: "🚗 Улица Кирова — ТРЦ Иремель",
            address: "пешеходная зона, центр",
            embed: "https://maps.ufanet.ru/cam/1312?embed=1"
        },
        {
            name: "🏟️ Стадион Нефтяник",
            address: "спортивная арена, парковка",
            embed: "https://maps.ufanet.ru/cam/1044?embed=1"
        },
        {
            name: "🌉 Бельский мост (старый)",
            address: "выезд из центра, река Белая",
            embed: "https://maps.ufanet.ru/cam/1277?embed=1"
        },
        {
            name: "📚 БашГУ — Сипайлово",
            address: "жилой массив, социальная инфраструктура",
            embed: "https://maps.ufanet.ru/cam/1095?embed=1"
        }
    ];

    function renderCameras() {
        const grid = document.getElementById('camGrid');
        if (!grid) return;
        grid.innerHTML = '';
        
        cameras.forEach(cam => {
            const card = document.createElement('div');
            card.className = 'cam-card';
            
            card.innerHTML = `
                <div class="cam-view">
                    <iframe src="${cam.embed}" 
                            allow="autoplay; encrypted-media" 
                            allowfullscreen 
                            loading="lazy"
                            referrerpolicy="no-referrer">
                    </iframe>
                </div>
                <div class="cam-label">
                    <div class="cam-name">
                        <span class="live-tag"></span> ${cam.name}
                    </div>
                    <div class="cam-address">
                        📍 ${cam.address}
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function refreshAll() {
        renderCameras();
    }

    renderCameras();

    const refreshBtn = document.getElementById('refreshBtn');
    if (refreshBtn) {
        refreshBtn.addEventListener('click', () => {
            refreshAll();
        });
    }
</script>
</body>
</html>
