<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FileShare - Готово</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #00b4db, #0083b0);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .box {
            background: white;
            border-radius: 32px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            color: #0083b0;
        }
        .link-box {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 16px;
            margin: 20px 0;
            word-break: break-all;
        }
        .btn {
            background: #0083b0;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        .btn:hover {
            background: #006994;
        }
        .success {
            color: #10b981;
            font-size: 48px;
            margin-bottom: 20px;
        }
        .info {
            background: #e6f7ff;
            padding: 15px;
            border-radius: 12px;
            margin-top: 20px;
            font-size: 14px;
            color: #005c8a;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 12px;
            margin: 10px 0;
            font-size: 14px;
            background: white;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="success">✅</div>
        <h1>Готово!</h1>
        <p style="margin-bottom: 20px;">Твой сайт работает</p>
        
        <div class="link-box">
            <strong>🔗 Твоя ссылка:</strong><br>
            <input type="text" id="siteUrl" readonly value="https://твой-сайт.github.io" style="margin-top: 10px;">
        </div>
        
        <button class="btn" onclick="copyUrl()">📋 Скопировать ссылку на сайт</button>
        
        <div class="info">
            📌 <strong>Как передать файл:</strong><br><br>
            1. Открой этот сайт на телефоне<br>
            2. Нажми на ссылку ниже<br>
            3. Загрузи файл и получи ссылку<br><br>
            👇 <strong>Рабочий загрузчик (без блокировок):</strong>
        </div>
        
        <button class="btn" onclick="window.open('https://c2c.to', '_blank')" style="background: #10b981;">
            🚀 Открыть загрузчик файлов
        </button>
        
        <button class="btn" onclick="window.open('https://dropmefiles.com', '_blank')" style="background: #6c5ce7; margin-top: 10px;">
            📁 Альтернатива: DropMeFiles
        </button>
    </div>

    <script>
        function copyUrl() {
            const input = document.getElementById('siteUrl');
            input.select();
            document.execCommand('copy');
            alert('✅ Ссылка на сайт скопирована!');
        }
        
        // Подставляем реальный адрес
        const url = window.location.href;
        document.getElementById('siteUrl').value = url;
    </script>
</body>
</html>
