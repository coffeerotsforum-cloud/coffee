<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Защищённый ресурс</title>
    
    <!-- БЛОК ТОТАЛЬНОЙ ЗАЩИТЫ - НАЧАЛО -->
    
    <!-- Мета-теги безопасности -->
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
    <meta http-equiv="Content-Security-Policy" content="frame-ancestors 'none'; default-src 'self'">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="Strict-Transport-Security" content="max-age=31536000; includeSubDomains">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    
    <!-- Стиль: запрет выделения текста -->
    <style>
        body {
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }
        ::selection {
            background: transparent;
        }
        ::-moz-selection {
            background: transparent;
        }
    </style>
    
    <script>
        // ТОТАЛЬНАЯ ЗАЩИТА - СКРИПТ
        (function() {
            // 1. Блокировка клавиш разработчика
            document.addEventListener('keydown', function(e) {
                // F12, Ctrl+Shift+I, Ctrl+U, Ctrl+S, Ctrl+P
                if (e.key === 'F12' ||
                    (e.ctrlKey && e.shiftKey && e.key === 'I') ||
                    (e.ctrlKey && e.key === 'U') ||
                    (e.ctrlKey && e.key === 'S') ||
                    (e.ctrlKey && e.key === 'P')) {
                    e.preventDefault();
                    return false;
                }
            });
            
            // 2. Блокировка правой кнопки мыши
            document.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                return false;
            });
            
            // 3. Обнаружение открытых инструментов разработчика
            setInterval(function() {
                var startTime = performance.now();
                debugger;
                var endTime = performance.now();
                if (endTime - startTime > 100) {
                    // Инструменты разработчика открыты
                    document.body.innerHTML = '<h1 style="color:red;text-align:center;margin-top:20%">Доступ запрещён</h1>';
                    window.location.href = 'about:blank';
                }
            }, 500);
            
            // 4. Проверка User-Agent (только реальные браузеры)
            var allowedAgents = ['Chrome', 'Firefox', 'Safari', 'Edge', 'Opera'];
            var isValid = false;
            for (var i = 0; i < allowedAgents.length; i++) {
                if (navigator.userAgent.indexOf(allowedAgents[i]) !== -1) {
                    isValid = true;
                    break;
                }
            }
            if (!isValid) {
                document.write('<h1 style="color:red;text-align:center;margin-top:20%">Ошибка 403</h1>');
                throw new Error('Доступ запрещён');
            }
            
            // 5. Защита от встраивания во фреймы
            if (window.self !== window.top) {
                window.top.location = window.self.location;
            }
            
            // 6. Подмена истории для запутывания (каждые 10 секунд)
            var counter = 0;
            setInterval(function() {
                counter++;
                if (counter >= 10) {
                    history.replaceState(null, '', '?session=' + Math.random().toString(36).substr(2, 8));
                    counter = 0;
                }
            }, 10000);
            
            // 7. Защита от копирования текста
            document.addEventListener('copy', function(e) {
                e.preventDefault();
                return false;
            });
            
            // 8. Защита от снятия скриншота (только визуальное предупреждение)
            document.addEventListener('keydown', function(e) {
                if (e.key === 'PrintScreen') {
                    alert('Создание скриншотов запрещено');
                    return false;
                }
            });
        })();
    </script>
    
    <!-- БЛОК ТОТАЛЬНОЙ ЗАЩИТЫ - КОНЕЦ -->
</head>
<body>
    <!-- Здесь будет содержимое вашего сайта -->
    <h1>Ваш контент</h1>
</body>
</html>
