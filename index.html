<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FileShare - Простая загрузка файлов</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        h1 {
            font-size: 28px;
            color: #1e3c72;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid #eee;
        }
        input[type="file"] {
            width: 100%;
            padding: 40px 20px;
            border: 2px dashed #ccc;
            border-radius: 16px;
            background: #fafafa;
            cursor: pointer;
            margin-bottom: 20px;
        }
        input[type="file"]:hover {
            border-color: #1e3c72;
            background: #f5f5ff;
        }
        button {
            background: #1e3c72;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
        }
        button:hover {
            background: #2a5298;
            transform: scale(1.02);
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .progress {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 4px;
            margin: 15px 0;
            overflow: hidden;
            display: none;
        }
        .progress-bar {
            width: 0%;
            height: 100%;
            background: #48bb78;
            transition: width 0.3s;
        }
        .result {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            display: none;
            word-break: break-all;
        }
        .success { color: #48bb78; font-weight: bold; margin-bottom: 10px; }
        .error { color: #e53e3e; font-weight: bold; }
        .link-box {
            background: white;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin: 10px 0;
        }
        .copy-btn {
            background: #48bb78;
            margin-top: 10px;
            padding: 10px;
        }
        .info {
            background: #e3f2fd;
            padding: 12px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 13px;
            color: #1976d2;
        }
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid white;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>📤 FileShare</h1>
        <div class="subtitle">Загрузи файл — получи ссылку</div>
        
        <input type="file" id="fileInput">
        
        <div class="progress" id="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        
        <button id="uploadBtn" disabled>Выберите файл</button>
        
        <div id="result" class="result"></div>
        
        <div class="info">
            ✅ Файлы хранятся на сервере<br>
            ✅ Ссылка работает для всех<br>
            ✅ Можно удалить файл когда захочешь
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const progress = document.getElementById('progress');
        const progressBar = document.getElementById('progressBar');
        const resultDiv = document.getElementById('result');
        
        let selectedFile = null;
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                selectedFile = e.target.files[0];
                uploadBtn.disabled = false;
                uploadBtn.innerHTML = `📤 Загрузить ${selectedFile.name} (${formatBytes(selectedFile.size)})`;
                resultDiv.style.display = 'none';
            }
        });
        
        uploadBtn.addEventListener('click', () => {
            if (!selectedFile) return;
            
            uploadBtn.disabled = true;
            uploadBtn.innerHTML = '<span class="spinner"></span> Загрузка...';
            progress.style.display = 'block';
            progressBar.style.width = '0%';
            
            const formData = new FormData();
            formData.append('file', selectedFile);
            
            const xhr = new XMLHttpRequest();
            
            xhr.upload.addEventListener('progress', (e) => {
                if (e.lengthComputable) {
                    const percent = (e.loaded / e.total) * 100;
                    progressBar.style.width = percent + '%';
                }
            });
            
            xhr.addEventListener('load', () => {
                if (xhr.status === 200) {
                    try {
                        const response = JSON.parse(xhr.responseText);
                        if (response.success) {
                            showSuccess(response.url, response.filename);
                        } else {
                            showError(response.error || 'Ошибка загрузки');
                        }
                    } catch(e) {
                        showError('Ошибка ответа сервера');
                    }
                } else {
                    showError('Ошибка сервера: ' + xhr.status);
                }
                uploadBtn.disabled = false;
                uploadBtn.innerHTML = '📤 Загрузить другой файл';
            });
            
            xhr.addEventListener('error', () => {
                showError('Ошибка сети. Проверьте интернет.');
                uploadBtn.disabled = false;
                uploadBtn.innerHTML = '📤 Попробовать снова';
            });
            
            xhr.open('POST', 'upload.php');
            xhr.send(formData);
        });
        
        function showSuccess(url, filename) {
            progress.style.display = 'none';
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = `
                <div class="success">✅ Файл загружен!</div>
                <div class="link-box">
                    <strong>🔗 Ссылка для других:</strong><br>
                    <input type="text" id="fileUrl" value="${url}" readonly 
                           style="width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px;">
                    <button class="copy-btn" onclick="copyUrl()">📋 Скопировать ссылку</button>
                </div>
                <div style="margin-top: 15px; font-size: 13px; color: #666;">
                    💡 Отправьте эту ссылку кому угодно — файл скачается без регистрации
                </div>
                <button onclick="location.reload()" style="background: #6c757d; margin-top: 15px;">📤 Загрузить другой файл</button>
            `;
        }
        
        function showError(msg) {
            progress.style.display = 'none';
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = `
                <div class="error">❌ ${msg}</div>
                <button onclick="location.reload()" style="background: #6c757d; margin-top: 15px;">🔄 Попробовать снова</button>
            `;
        }
        
        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        window.copyUrl = () => {
            const input = document.getElementById('fileUrl');
            input.select();
            document.execCommand('copy');
            alert('✅ Ссылка скопирована!');
        };
    </script>
</body>
</html>
